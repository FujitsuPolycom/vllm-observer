# ---------------------------------------------------------------------------
# vLLM Observer — main Docker Compose deployment
#
# Build context is the repo root (build: ..) so the Dockerfile can COPY
# the observer/ and dashboard/ subdirectories. A .dockerignore at the repo
# root keeps .git, tests/, docs/ and other non-runtime files out of the
# build context for faster, leaner image builds.
#
# --- host.docker.internal on Linux -----------------------------------------
# On macOS and Windows, Docker Desktop resolves host.docker.internal
# automatically.  On Linux it does NOT — the extra_hosts entry below
# maps host.docker.internal to host-gateway so the observer container can
# reach vLLM ports published on the host.
#
# If you run the observer with plain `docker run` (no Compose), add:
#   --add-host=host.docker.internal:host-gateway
# or set VLLM_OBSERVER_METRICS_HOST to the host's IP / 172.17.0.1 directly.
#
# --- Env var cascade -------------------------------------------------------
# VLLM_OBSERVER_METRICS_HOST default chain:
#   1. Value from .env or shell environment (highest priority)
#   2. Compose default:  host.docker.internal  (works with extra_hosts)
#   3. collector.py default: 127.0.0.1  (host-network mode, no Compose)
#
# Copy .env.example to .env and edit values as needed:
#   cp .env.example .env
# ---------------------------------------------------------------------------

services:
  vllm-observer:
    build: ..
    container_name: vllm-observer
    restart: unless-stopped
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8088/api/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      VLLM_OBSERVER_DOCKER: "1"
      VLLM_OBSERVER_DISCOVERY_TERMS: "${VLLM_OBSERVER_DISCOVERY_TERMS:-}"
      VLLM_OBSERVER_LOG_TAIL: "320"
      VLLM_OBSERVER_LOG_SAMPLE_SECONDS: "${VLLM_OBSERVER_LOG_SAMPLE_SECONDS:-3}"
      VLLM_OBSERVER_LOG_HISTORY_SECONDS: "${VLLM_OBSERVER_LOG_HISTORY_SECONDS:-604800}"
      VLLM_OBSERVER_LOG_CONTEXT_SECONDS: "${VLLM_OBSERVER_LOG_CONTEXT_SECONDS:-30}"
      VLLM_OBSERVER_LOG_CONTEXT_LINES: "${VLLM_OBSERVER_LOG_CONTEXT_LINES:-1000}"
      VLLM_OBSERVER_LOG_HISTORY_MAX_BYTES: "${VLLM_OBSERVER_LOG_HISTORY_MAX_BYTES:-50000000}"
      VLLM_OBSERVER_METRICS_HOST: "${VLLM_OBSERVER_METRICS_HOST:-host.docker.internal}"
      VLLM_OBSERVER_SAMPLE_SECONDS: "${VLLM_OBSERVER_SAMPLE_SECONDS:-1}"
      VLLM_OBSERVER_HISTORY_POINTS: "${VLLM_OBSERVER_HISTORY_POINTS:-3600}"
      VLLM_OBSERVER_DATA_DIR: "/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - vllm-observer-data:/data
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true

volumes:
  vllm-observer-data:
