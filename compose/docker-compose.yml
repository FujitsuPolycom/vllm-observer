services:
  vllm-observer:
    build: ..
    container_name: vllm-observer
    restart: unless-stopped
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8088/api/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      VLLM_OBSERVER_DOCKER: "1"
      VLLM_OBSERVER_DISCOVERY_TERMS: "${VLLM_OBSERVER_DISCOVERY_TERMS:-}"
      VLLM_OBSERVER_LOG_TAIL: "320"
      VLLM_OBSERVER_LOG_SAMPLE_SECONDS: "${VLLM_OBSERVER_LOG_SAMPLE_SECONDS:-3}"
      VLLM_OBSERVER_LOG_HISTORY_SECONDS: "${VLLM_OBSERVER_LOG_HISTORY_SECONDS:-604800}"
      VLLM_OBSERVER_LOG_CONTEXT_SECONDS: "${VLLM_OBSERVER_LOG_CONTEXT_SECONDS:-30}"
      VLLM_OBSERVER_LOG_CONTEXT_LINES: "${VLLM_OBSERVER_LOG_CONTEXT_LINES:-1000}"
      VLLM_OBSERVER_LOG_HISTORY_MAX_BYTES: "${VLLM_OBSERVER_LOG_HISTORY_MAX_BYTES:-50000000}"
      VLLM_OBSERVER_METRICS_HOST: "${VLLM_OBSERVER_METRICS_HOST:-host.docker.internal}"
      VLLM_OBSERVER_SAMPLE_SECONDS: "${VLLM_OBSERVER_SAMPLE_SECONDS:-1}"
      VLLM_OBSERVER_HISTORY_POINTS: "${VLLM_OBSERVER_HISTORY_POINTS:-3600}"
      VLLM_OBSERVER_DATA_DIR: "/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - vllm-observer-data:/data
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true

volumes:
  vllm-observer-data:
