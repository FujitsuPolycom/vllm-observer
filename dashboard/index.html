<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>vLLM Observer</title><link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header><a class="brand" href="/"><span class="mark"></span>vLLM Observer</a><div class="header-actions"><button id="styleToggle" type="button">Minimal view</button><button id="compose" type="button">Build Compose</button><span id="status">connecting</span></div></header>
  <main>
    <section class="hero"><div><h1>vLLM Observer</h1></div><div class="sample"><span>LAST SAMPLE</span><strong id="sampleTime">waiting</strong></div></section>
    <div class="toolbar"><label for="instance">WORKLOAD</label><select id="instance"><option>discovering...</option></select><button id="pause" type="button">Pause</button><span id="refresh">refreshing every 3s</span></div>
    <section class="section"><div class="section-head"><div><h2>Model and runtime configuration</h2></div><span id="configMeta">waiting</span></div><div id="config" class="config-grid"></div></section>
    <section class="section"><div class="section-head"><div><h2>Performance</h2></div><span id="metricMeta">waiting for metrics</span></div><div id="metrics" class="metrics"></div></section>
    <section class="section"><div class="section-head"><div><h2>Subsystem logs</h2></div><span id="logMeta">waiting</span></div><div id="logs" class="logs"></div></section>
  </main>
  <footer>vLLM Observer · no writes, no container mutations, no fabricated metrics</footer>
  <script src="/app.js?v=d078607"></script><script>function renderMetrics(values,live){const liveLabels={fresh_prefill_tokens_per_second:'Fresh prefill',cached_ingest_tokens_per_second:'Cached ingest',decode_tokens_per_second:'Decode',cache_hit_percent:'Cache hit',running_requests:'Running',waiting_requests:'Queued'};const liveKeys=['fresh_prefill_tokens_per_second','cached_ingest_tokens_per_second','decode_tokens_per_second','cache_hit_percent','running_requests','waiting_requests'].filter(key=>live&&live[key]!==undefined);const keys=liveKeys.length?liveKeys:Object.keys(values);const source=liveKeys.length?'LIVE · Prometheus counter deltas':'LOG SNAPSHOT · coarse rolling logger';const signature=source+'|'+keys.join('|');const host=document.getElementById('metrics');if(host.dataset.signature===signature&&host.children.length===keys.length){keys.forEach((key,index)=>{const card=host.children[index];const isLive=liveKeys.includes(key);card.querySelector('.metric-value').textContent=format(key,isLive?live[key]:values[key]);card.querySelector('.metric-note').textContent=isLive?source:'latest observed value'});document.getElementById('metricMeta').textContent=keys.length?`${source} · ${keys.length} values`:'no metrics found';return}host.dataset.signature=signature;host.innerHTML=keys.length?keys.map(key=>{const isLive=liveKeys.includes(key);return `<article class="metric"><div class="metric-label">${esc((isLive?liveLabels[key]:labels[key])||key.replaceAll('_',' '))}</div><div class="metric-value">${esc(format(key,isLive?live[key]:values[key]))}</div><div class="metric-note">${isLive?esc(source):'latest observed value'}</div></article>`}).join(''):'<article class="metric unavailable"><div class="metric-label">Performance</div><div class="metric-value">not reported</div><div class="metric-note">this workload emitted no recognized metrics</div></article>';document.getElementById('metricMeta').textContent=keys.length?`${source} · ${keys.length} values`:'no metrics found'}setTimeout(()=>{if(typeof state!=='undefined'&&state.selected)renderConfig(state.instances.find(x=>x.name===state.selected))},500)</script>
</body>
</html>
