services:
  vllm-observer:
    build: ..
    container_name: vllm-observer
    restart: unless-stopped
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8088/api/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      VLLM_OBSERVER_DOCKER: "0"
      VLLM_OBSERVER_LOG_PATHS: /logs
      VLLM_OBSERVER_METRICS_URL: "${VLLM_OBSERVER_METRICS_URL:-}"
      VLLM_OBSERVER_DATA_DIR: /data
      VLLM_OBSERVER_LOG_SAMPLE_SECONDS: "${VLLM_OBSERVER_LOG_SAMPLE_SECONDS:-3}"
      VLLM_OBSERVER_LOG_HISTORY_SECONDS: "${VLLM_OBSERVER_LOG_HISTORY_SECONDS:-604800}"
      VLLM_OBSERVER_LOG_HISTORY_MAX_BYTES: "${VLLM_OBSERVER_LOG_HISTORY_MAX_BYTES:-50000000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/logs:ro
      - vllm-observer-files-data:/data
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true

volumes:
  vllm-observer-files-data:
