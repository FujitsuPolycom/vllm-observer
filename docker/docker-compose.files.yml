services:
  vllm-observer:
    build: ..
    container_name: vllm-observer
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      VLLM_OBSERVER_DOCKER: "0"
      VLLM_OBSERVER_LOG_PATHS: /logs
    volumes:
      - ./logs:/logs:ro
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
